version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - brest_postgres_data:/var/lib/postgresql/data/
    networks:
      - app_network

  adminer:
      image: adminer
      container_name: adminer
      restart: always
      ports:
        - 8080:8080
      networks:
        - app_network

  django_backend:
    build: .
    container_name: django
    command: daphne -p 8000 GNS.asgi:application --bind 0.0.0.0
    restart: always
    ports:
      - 8000:8000
    env_file:
      - ./.env
    depends_on:
      - db
    environment:
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
    networks:
      - app_network

  rfid:
    build: ../rfid app
    container_name: rfid
    restart: always
    ports:
      - 8001:8001
    env_file:
      - ./.env
    depends_on:
      - db
    environment:
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
    networks:
      - app_network

volumes:
  brest_postgres_data:

networks:
    app_network:
        name: 'app_network'
        driver: bridge